<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a5c31">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Testing — Learning Center</title>
    <style>
      /* ── Home-screen layout (shared) ── */
      body{font-family:system-ui,Arial,sans-serif;margin:0;padding:0;background-image:linear-gradient(rgba(255,255,255,0.75),rgba(255,255,255,0.75)),url('/data/background.jpg');background-attachment:fixed;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#fff;min-height:100vh;color:#243228;display:flex;flex-direction:column;align-items:center;}
      .banner{display:flex;justify-content:space-between;align-items:center;padding:32px 36px;background:linear-gradient(90deg,#1f7a3f 0%,#1a5c31 100%);color:#fff;box-shadow:0 14px 38px rgba(26,92,49,0.16);width:100%;box-sizing:border-box;}
      .banner h1{margin:0;font-size:3rem;font-weight:700;letter-spacing:-0.02em;}
      .banner-link{cursor:pointer;color:#fff;text-decoration:none;background:rgba(255,255,255,0.16);padding:16px 32px;border-radius:999px;font-weight:600;font-size:1.05rem;transition:all 0.3s;border:1px solid rgba(255,255,255,0.25);}
      .banner-link:hover{transform:translateY(-1px);background:rgba(255,255,255,0.22);box-shadow:0 10px 24px rgba(15,62,31,0.18);}
      .options{display:flex;flex-direction:column;gap:24px;align-items:stretch;justify-content:center;padding:24px;width:100%;box-sizing:border-box;flex:1;}
      .card{width:100%;flex:1;min-height:200px;padding:40px 48px;border-radius:18px;cursor:pointer;background:linear-gradient(90deg,#1a5c31,#20803c);color:#fff;text-align:center;font-size:1.65rem;font-weight:700;letter-spacing:0.01em;box-shadow:0 10px 30px rgba(26,92,49,0.08);border:1px solid rgba(26,92,49,0.12);transition:all 0.25s;display:flex;align-items:center;justify-content:center;text-decoration:none;}
      .card:hover{background:linear-gradient(90deg,#0f3e1f,#1a5c31);transform:translateY(-2px);box-shadow:0 16px 34px rgba(26,92,49,0.14);}
      @media(min-width:640px){.options{flex-direction:row;padding:48px 24px 64px;}.card{width:auto;flex:1;min-height:auto;}}

      /* ── Sub-screen form layout ── */
      .form-shell{width:100%;max-width:700px;padding:24px;box-sizing:border-box;}
      .note{background:#fff3cd;border:1px solid #ffeaa7;padding:20px;border-radius:8px;margin-bottom:28px;font-weight:500;color:#856404;border-left:4px solid #ffc107;font-size:1.05rem;}
      .note p{margin:0 0 8px;}.note p:last-child{margin-bottom:0;}
      form div{margin-bottom:20px;}
      label{display:flex;flex-direction:column;font-weight:600;margin-bottom:10px;color:#333;font-size:1.05rem;}
      input,select,textarea{padding:16px;border:1px solid #e9ecef;border-radius:8px;font-family:inherit;background:#f8f9fa;color:#333;transition:border-color 0.3s;font-size:1rem;}
      input:focus,select:focus,textarea:focus{border-color:#0f3e1f;outline:none;}
      input::placeholder,textarea::placeholder{color:#6c757d;}
      input[type="email"],input[type="text"],input[type="date"],input[type="time"],select,textarea{width:100%;box-sizing:border-box;}
      .required::after{content:" *";color:#ff6b6b;}
      button[type="submit"]{padding:16px 32px;background:linear-gradient(90deg,#0f3e1f,#1a5c31);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:18px;font-weight:600;transition:all 0.3s;box-shadow:0 2px 8px rgba(15,62,31,0.2);}
      button[type="submit"]:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(15,62,31,0.3);}
      h2{color:#0f3e1f;font-size:2rem;font-weight:700;margin:0 0 28px;}
      .back-btn{color:#0f3e1f;text-decoration:none;background:#f8f9fa;padding:12px 24px;border-radius:8px;border:1px solid #e9ecef;font-weight:600;font-size:1.05rem;transition:all 0.3s;display:inline-block;cursor:pointer;margin-bottom:28px;}
      .back-btn:hover{background:#0f3e1f;color:#fff;transform:translateY(-1px);}
      .honor-heading{font-weight:700;color:#0f3e1f;font-size:1.05rem;margin-bottom:12px;}
      .honor-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;padding:14px;background:#f8f9fa;border-radius:8px;border:1px solid #e9ecef;}
      .honor-item input[type="checkbox"]{width:18px;height:18px;flex-shrink:0;margin-top:2px;accent-color:#0f3e1f;padding:0;border:none;}
      .honor-item label{font-weight:400;font-size:0.95rem;line-height:1.55;cursor:pointer;margin:0;}
    </style>
  </head>
  <body>

    <!-- ═══ LANDING ═══ -->
    <div id="screen-landing" style="display:flex;flex-direction:column;width:100%;flex:1;">
      <div class="banner">
        <h1>Testing</h1>
        <a class="banner-link" href="/">← Back to Home</a>
      </div>
      <div class="options">
        <a class="card" href="/testing-signup.html">Schedule a Test</a>
        <a class="card" href="/testing-login.html">Testing Sign In</a>
      </div>
    </div>

    <script></script>
  </body>
</html>
