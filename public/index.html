<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Learning Center - Home</title>
    <style>
      :root{--green:#1a5c31;--green-dark:#0f3e1f;--green-soft:#edf7ee;--text:#243228;--surface:#f9faf8}
      body{font-family:system-ui,Arial,sans-serif;margin:0;padding:0;background-image:linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)), url('/data/background.jpg');background-attachment:fixed;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#ffffff;min-height:100vh;color:var(--text);display:flex;flex-direction:column;align-items:center;}
      .page-shell{width:100%;padding:0;box-sizing:border-box;}
      .banner{display:flex;justify-content:space-between;align-items:center;padding:32px 36px;border-radius:0;background:linear-gradient(90deg, #1f7a3f 0%, #1a5c31 100%);color:#fff;box-shadow:0 14px 38px rgba(26,92,49,0.16);margin:0;width:100%;box-sizing:border-box;}
      .banner h1{margin:0;font-size:3rem;font-weight:700;letter-spacing:-0.02em;}
      .topright{cursor:pointer;color:#fff;text-decoration:none;background:rgba(255,255,255,0.16);padding:16px 32px;border-radius:999px;font-weight:600;font-size:1.05rem;transition:all 0.3s;border:1px solid rgba(255,255,255,0.25)}
      .topright:hover{transform:translateY(-1px);background:rgba(255,255,255,0.22);box-shadow:0 10px 24px rgba(15, 62, 31, 0.18)}
      .hero-text{max-width:560px;}
      .hero-text p{margin:20px 0 0;font-size:1.3rem;line-height:1.8;color:rgba(255,255,255,0.9)}
      .options{display:flex;flex-direction:column;gap:24px;align-items:center;justify-content:center;padding:48px 24px 64px;max-width:900px;width:100%;box-sizing:border-box;}
      .card{width:min(100%,380px);min-height:200px;padding:40px 48px;border-radius:18px;cursor:pointer;background:linear-gradient(180deg, #eef8ee 0%, #ffffff 100%);color:var(--green-dark);text-align:center;font-size:1.65rem;font-weight:700;letter-spacing:0.01em;box-shadow:0 10px 30px rgba(26,92,49,0.08);border:1px solid rgba(26,92,49,0.12);transition:all 0.25s;display:flex;align-items:center;justify-content:center;}
      .card:hover{transform:translateY(-2px);box-shadow:0 16px 34px rgba(26,92,49,0.14);border-color:rgba(26,92,49,0.18)}
      .card.primary{background:linear-gradient(90deg, #1a5c31, #20803c);color:#fff;}
      .card.primary:hover{background:linear-gradient(90deg, #0f3e1f, #1a5c31);}
      .button-row{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;width:100%;margin-top:12px;}
      .admin-action{padding:14px 24px;border-radius:999px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.14);color:#fff;font-weight:600;}
      .admin-action:hover{background:rgba(255,255,255,0.2);}
      .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:999}
      .modal-box{background:#fff;padding:40px;border-radius:14px;box-shadow:0 18px 42px rgba(0,0,0,0.18);min-width:360px;border:1px solid #e8eceb}
      .modal-box h2{margin-top:0;color:var(--green-dark);font-size:28px;font-weight:700}
      .modal-box label{display:flex;flex-direction:column;margin-bottom:18px;font-weight:600;color:var(--text);font-size:1.1rem;}
      .modal-box input{padding:16px;border:1px solid #dfe6e3;border-radius:10px;margin-top:10px;background:#f7faf6;font-size:1rem;}
      .modal-box input:focus{border-color:var(--green);outline:none;box-shadow:0 0 0 3px rgba(30,107,54,0.12)}
      .modal-box .buttons{display:flex;gap:12px;margin-top:28px}
      .modal-box button{padding:14px 28px;border:none;border-radius:10px;cursor:pointer;font-size:18px;font-weight:600;transition:all 0.25s}
      .modal-box .login-btn{background:linear-gradient(90deg, #1a5c31, #20803c);color:#fff}
      .modal-box .login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(15, 62, 31, 0.18)}
      .modal-box .cancel-btn{background:#6c757d;color:#fff}
      .modal-box .cancel-btn:hover{background:#5a6268}
      h1{color:#fff;font-size:2rem;margin:0}
      .underline{width:64px;height:4px;background:#fff;border-radius:999px;margin:24px auto 0;}
      @media (min-width:640px) {.options{flex-direction:row;}}
    </style>
  </head>
  <body>
    <div class="banner">
      <div class="hero-text">
        <h1>Learning Center</h1>
      </div>
      <a class="topright admin-action" id="adminLink" href="#">Admin Login</a>
    </div>

    <div class="options">
      <div class="card primary" id="tutoring">Homework/Study</div>
      <div class="card primary" id="testing">Testing</div>
    </div>

    <div id="adminModal" class="modal-overlay" style="display:none">
      <div class="modal-box">
        <h2>Admin Login</h2>
        <label>
          Password
          <input type="password" id="adminPassword" placeholder="Enter password" />
        </label>
        <div class="buttons">
          <button class="login-btn" id="adminLoginBtn">Login</button>
          <button class="cancel-btn" id="adminCancelBtn">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      // Defensive DOM wiring: check elements exist before attaching listeners
      const adminLink = document.getElementById('adminLink');
      const adminModal = document.getElementById('adminModal');
      const adminPassword = document.getElementById('adminPassword');
      const adminLoginBtn = document.getElementById('adminLoginBtn');
      const adminCancelBtn = document.getElementById('adminCancelBtn');

      if (adminLink && adminModal && adminPassword) {
        adminLink.addEventListener('click', (e) => {
          e.preventDefault();
          adminModal.style.display = 'flex';
          try { adminPassword.focus(); } catch (e) {}
        });
      } else {
        console.warn('Admin login elements missing on this page');
      }

      if (adminCancelBtn && adminModal && adminPassword) {
        adminCancelBtn.addEventListener('click', () => {
          adminModal.style.display = 'none';
          adminPassword.value = '';
        });
      }

      if (adminLoginBtn && adminPassword) {
        adminLoginBtn.addEventListener('click', async () => {
          const pwd = adminPassword.value;
          try {
            const res = await fetch('/api/admin-login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'include',
              body: JSON.stringify({ password: pwd })
            });
            if (res.ok) {
              window.location.href = '/admin.html';
            } else {
              alert('Incorrect password');
              adminPassword.value = '';
            }
          } catch (err) {
            alert('Login failed');
          }
        });

        adminPassword.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') adminLoginBtn.click();
        });
      }

      const tutoringBtn = document.getElementById('tutoring');
      const testingBtn = document.getElementById('testing');
      if (tutoringBtn) {
        tutoringBtn.addEventListener('click', () => { window.location.href = '/tutoring.html'; });
      } else {
        console.warn('Tutoring button not found');
      }
      if (testingBtn) {
        testingBtn.addEventListener('click', () => { window.location.href = '/testing.html'; });
      } else {
        console.warn('Testing button not found');
      }
    </script>
  </body>
</html>
