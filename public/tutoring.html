<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Homework/Study — Students</title>
    <style>
      body{font-family:system-ui,Arial;margin:24px;background:#ffffff;min-height:100vh;color:#333}
      .topright{position:fixed;right:16px;top:12px}
      #search{width:100%;padding:16px;margin-bottom:20px;border:1px solid #e9ecef;border-radius:8px;background:#f8f9fa;color:#333;font-size:1.05rem;}
      #search::placeholder{color:#6c757d}
      .student{padding:18px;border-bottom:1px solid #f1f3f4;display:flex;justify-content:space-between;color:#333;font-size:1.1rem;}
      .logged{background:rgba(15, 62, 31, 0.1);border-left:4px solid #0f3e1f}
      h1{color:#0f3e1f;font-size:36px;font-weight:600;margin-bottom:28px}
      p a{color:#0f3e1f;text-decoration:none;background:#f8f9fa;padding:12px 24px;border-radius:8px;border:1px solid #e9ecef;font-weight:500;font-size:1.05rem;transition:all 0.3s}
      p a:hover{background:#0f3e1f;color:#fff;transform:translateY(-1px)}
    </style>
  </head>
  <body>
    <div style="background:#fff3cd;border:1px solid #ffeeba;color:#856404;padding:16px;border-radius:10px;margin-bottom:20px;font-size:1rem;">
      Dont see yourself? Ask the staff
    </div>
    <h1>Homework/Study — Students</h1>
    <p><a href="/">← Back to Home</a></p>
    <input id="search" placeholder="Search students by name or id..." />
    <div id="list">Loading…</div>

    <!-- Subject modal (shown only when logging IN) -->
    <div id="subjectModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:999;align-items:center;justify-content:center;">
      <div style="background:#fff;padding:36px;border-radius:14px;box-shadow:0 18px 42px rgba(0,0,0,0.18);min-width:320px;max-width:460px;width:90%;border:1px solid #e8eceb;">
        <h2 style="margin-top:0;color:#0f3e1f;font-size:1.5rem;font-weight:700;">What subject are you working on?</h2>
        <p id="subjectStudentName" style="margin:0 0 20px;color:#555;font-size:1.05rem;"></p>
        <div id="subjectButtons" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;"></div>
        <button id="subjectCancelBtn" style="width:100%;padding:14px;background:#6c757d;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;">Cancel</button>
      </div>
    </div>

    <script>
      const SUBJECTS = ['Math', 'English', 'Social Studies', 'Foreign Language', 'Science', 'Religion', 'Other'];

      let students = [];
      let pendingStudent = null;

      const subjectModal = document.getElementById('subjectModal');

      // Build subject buttons once
      SUBJECTS.forEach(subj => {
        const btn = document.createElement('button');
        btn.textContent = subj;
        btn.style.cssText = 'padding:16px 10px;background:linear-gradient(90deg,#1a5c31,#20803c);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;';
        btn.addEventListener('click', () => {
          subjectModal.style.display = 'none';
          if (pendingStudent) { doToggle(pendingStudent.firstName, pendingStudent.lastName, subj); pendingStudent = null; }
        });
        document.getElementById('subjectButtons').appendChild(btn);
      });

      document.getElementById('subjectCancelBtn').addEventListener('click', () => {
        subjectModal.style.display = 'none';
        pendingStudent = null;
      });

      async function loadStudents(){
        try {
          const res = await fetch('/api/students');
          students = await res.json();
          renderList(students);
        } catch (err) {
          document.getElementById('list').innerHTML = '<p>Failed to load students</p>';
        }
      }

      function renderList(arr){
        const el = document.getElementById('list');
        if (!arr.length) { el.innerHTML = '<p>No students</p>'; return }
        el.innerHTML = '';
        const sorted = [...arr].sort((a, b) => {
          if (a.loggedIn && !b.loggedIn) return -1;
          if (!a.loggedIn && b.loggedIn) return 1;
          const ln = (a.lastName || '').localeCompare(b.lastName || '');
          if (ln !== 0) return ln;
          return (a.firstName || '').localeCompare(b.firstName || '');
        });

        sorted.forEach(s => {
          const item = document.createElement('div');
          item.className = 'student' + (s.loggedIn ? ' logged' : '');
          item.innerHTML = `<div>${s.firstName} ${s.lastName} (Grade ${s.grade})</div><div>${s.loggedIn ? 'LOGGED IN' : ''}</div>`;
          item.addEventListener('click', () => {
            if (s.loggedIn) {
              doToggle(s.firstName, s.lastName, null); // logging out — no subject needed
            } else {
              pendingStudent = s;
              document.getElementById('subjectStudentName').textContent = `${s.firstName} ${s.lastName} (Grade ${s.grade})`;
              subjectModal.style.display = 'flex';
            }
          });
          el.appendChild(item);
        });
      }

      function filterList(q){
        q = q.trim().toLowerCase();
        if (!q) return students;
        return students.filter(s => (s.firstName + ' ' + s.lastName).toLowerCase().includes(q) || String(s.id).includes(q));
      }

      document.getElementById('search').addEventListener('input', (e) => {
        renderList(filterList(e.target.value));
      });

      async function doToggle(firstName, lastName, subject) {
        try {
          const body = { firstName, lastName };
          if (subject) body.subject = subject;
          const res = await fetch('/api/toggle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          if (!res.ok) { alert('Failed to toggle student'); return; }
          window.location.href = '/';
        } catch (err) {
          alert('Failed to toggle student');
        }
      }

      loadStudents();
    </script>
  </body>
</html>
