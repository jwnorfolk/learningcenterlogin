<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Homework/Study — Students</title>
    <style>
      body{font-family:system-ui,Arial;margin:24px;background:#ffffff;min-height:100vh;color:#333}
      .topright{position:fixed;right:16px;top:12px}
      #search{width:100%;padding:16px;margin-bottom:20px;border:1px solid #e9ecef;border-radius:8px;background:#f8f9fa;color:#333;font-size:1.05rem;}
      #search::placeholder{color:#6c757d}
      .student{padding:18px;border-bottom:1px solid #f1f3f4;display:flex;justify-content:space-between;color:#333;font-size:1.1rem;}
      .logged{background:rgba(15, 62, 31, 0.1);border-left:4px solid #0f3e1f}
      h1{color:#0f3e1f;font-size:36px;font-weight:600;margin-bottom:28px}
      p a{color:#0f3e1f;text-decoration:none;background:#f8f9fa;padding:12px 24px;border-radius:8px;border:1px solid #e9ecef;font-weight:500;font-size:1.05rem;transition:all 0.3s}
      p a:hover{background:#0f3e1f;color:#fff;transform:translateY(-1px)}
    </style>
  </head>
  <body>
    <h1>Homework/Study — Students</h1>
    <p><a href="/">← Back to Home</a></p>
    <input id="search" placeholder="Search students by name or id..." />
    <div id="list">Loading…</div>

    <script>
      let students = [];

      async function loadStudents(){
        try {
          const res = await fetch('/api/students');
          students = await res.json();
          renderList(students);
        } catch (err) {
          document.getElementById('list').innerHTML = '<p>Failed to load students</p>';
        }
      }

      function renderList(arr){
        const el = document.getElementById('list');
        if (!arr.length) { el.innerHTML = '<p>No students</p>'; return }
        el.innerHTML = '';
        // Sort: logged-in students first, then by last name
        const sorted = [...arr].sort((a, b) => {
          if (a.loggedIn && !b.loggedIn) return -1;
          if (!a.loggedIn && b.loggedIn) return 1;
          // fallback to lastName then firstName
          const ln = (a.lastName || '').localeCompare(b.lastName || '');
          if (ln !== 0) return ln;
          return (a.firstName || '').localeCompare(b.firstName || '');
        });

        sorted.forEach(s => {
          const item = document.createElement('div');
          item.className = 'student' + (s.loggedIn ? ' logged' : '');
          item.innerHTML = `<div>${s.firstName} ${s.lastName} (Grade ${s.grade})</div><div>${s.loggedIn ? 'LOGGED IN' : ''}</div>`;
          item.addEventListener('click', () => toggleStudentAndReturnHome(s.firstName, s.lastName));
          el.appendChild(item);
        });
      }

      function filterList(q){
        q = q.trim().toLowerCase();
        if (!q) return students;
        return students.filter(s => (s.firstName + ' ' + s.lastName).toLowerCase().includes(q) || String(s.id).includes(q));
      }

      document.getElementById('search').addEventListener('input', (e) => {
        renderList(filterList(e.target.value));
      });

      // When toggling a student, redirect to the homepage immediately after success
      async function toggleStudentAndReturnHome(firstName, lastName){
        try {
          const res = await fetch('/api/toggle', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firstName, lastName })
          });
          if (!res.ok) { alert('Failed to toggle student'); return }
          // On success, go back to home as requested
          window.location.href = '/';
        } catch (err) {
          alert('Failed to toggle student');
        }
      }

      loadStudents();
    </script>
  </body>
</html>
